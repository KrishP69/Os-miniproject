<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="darkGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1f2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1117;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="serverGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2c3e50;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a252f;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0e7490;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f766e;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="4" dy="4" stdDeviation="6" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Dark Background -->
  <rect width="1600" height="600" fill="url(#darkGrad)"/>

  <!-- Left side: Server Rack -->
  <g filter="url(#shadow)">
    <rect x="40" y="60" width="240" height="480" fill="url(#serverGrad)" rx="12" stroke="#0e7490" stroke-width="2"/>
    <rect x="65" y="90" width="190" height="50" fill="#0e7490" opacity="0.8" rx="6"/>
    <line x1="75" y1="100" x2="240" y2="100" stroke="#00ff00" stroke-width="3" opacity="0.7"/>
    <circle cx="85" cy="100" r="4" fill="#00ff00"/>
    <circle cx="100" cy="100" r="4" fill="#ff6b6b"/>
    
    <rect x="65" y="160" width="190" height="50" fill="#1a252f" opacity="0.6" rx="6"/>
    <rect x="65" y="230" width="190" height="50" fill="#1a252f" opacity="0.6" rx="6"/>
    <rect x="65" y="300" width="190" height="50" fill="#0e7490" opacity="0.6" rx="6"/>
    <line x1="75" y1="310" x2="240" y2="310" stroke="#4ecdc4" stroke-width="2" opacity="0.6"/>
    
    <rect x="65" y="370" width="190" height="50" fill="#1a252f" opacity="0.6" rx="6"/>
    <circle cx="85" cy="385" r="4" fill="#ff6b6b"/>
  </g>

  <!-- Center: Process & Resource Network -->
  <g id="network">
    <!-- Process 1 -->
    <g filter="url(#shadow)">
      <rect x="450" y="120" width="140" height="140" fill="url(#accentGrad)" rx="10" opacity="0.9"/>
      <text x="520" y="200" text-anchor="middle" fill="white" font-size="18" font-weight="bold">PROCESS</text>
      <text x="520" y="225" text-anchor="middle" fill="white" font-size="14">A</text>
    </g>

    <!-- Process 2 -->
    <g filter="url(#shadow)">
      <rect x="450" y="340" width="140" height="140" fill="url(#accentGrad)" rx="10" opacity="0.8"/>
      <text x="520" y="420" text-anchor="middle" fill="white" font-size="18" font-weight="bold">PROCESS</text>
      <text x="520" y="445" text-anchor="middle" fill="white" font-size="14">B</text>
    </g>

    <!-- Resource 1 -->
    <g filter="url(#shadow)">
      <circle cx="850" cy="190" r="70" fill="#f39c12" opacity="0.85"/>
      <text x="850" y="200" text-anchor="middle" fill="white" font-size="20" font-weight="bold">📦</text>
      <text x="850" y="220" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RESOURCE</text>
      <text x="850" y="235" text-anchor="middle" fill="white" font-size="11">1</text>
    </g>

    <!-- Resource 2 -->
    <g filter="url(#shadow)">
      <circle cx="850" cy="410" r="70" fill="#e74c3c" opacity="0.85"/>
      <text x="850" y="420" text-anchor="middle" fill="white" font-size="20" font-weight="bold">💾</text>
      <text x="850" y="440" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RESOURCE</text>
      <text x="850" y="455" text-anchor="middle" fill="white" font-size="11">2</text>
    </g>

    <!-- Hold connections (white solid) -->
    <path d="M 590 180 Q 720 160 780 190" stroke="#ffffff" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="680" y="160" fill="#ffffff" font-size="11" font-weight="bold">holds</text>
    
    <path d="M 590 420 Q 720 430 780 410" stroke="#ffffff" stroke-width="3" fill="none"/>
    <text x="680" y="450" fill="#ffffff" font-size="11" font-weight="bold">holds</text>

    <!-- Wait connections (red dashed) -->
    <path d="M 780 250 Q 720 300 590 380" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
    <text x="700" y="330" fill="#ff6b6b" font-size="11" font-weight="bold">waits</text>
    
    <path d="M 780 350 Q 720 300 590 220" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-dasharray="8,4"/>
    <text x="700" y="270" fill="#ff6b6b" font-size="11" font-weight="bold">waits</text>
  </g>

  <!-- Right side: Status & Monitor -->
  <g>
    <!-- Circular Deadlock -->
    <g filter="url(#shadow)">
      <circle cx="1150" cy="300" r="120" fill="none" stroke="#ff6b6b" stroke-width="3" opacity="0.6" stroke-dasharray="10,5"/>
      <text x="1150" y="295" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold">CIRCULAR</text>
      <text x="1150" y="320" text-anchor="middle" fill="#ff6b6b" font-size="20" font-weight="bold">WAIT</text>
      <text x="1150" y="345" text-anchor="middle" fill="#ff6b6b" font-size="14">DEADLOCK!</text>
    </g>

    <!-- Status badge bottom right -->
    <g filter="url(#shadow)">
      <rect x="1250" y="480" width="130" height="80" fill="#0d1117" stroke="#ff6b6b" stroke-width="2" rx="8" opacity="0.9"/>
      <circle cx="1265" cy="495" r="6" fill="#ff6b6b"/>
      <text x="1285" y="500" fill="#ff6b6b" font-size="12" font-weight="bold">SYSTEM</text>
      <text x="1285" y="520" fill="#ff6b6b" font-size="11">LOCKED</text>
      <text x="1285" y="540" fill="#ff6b6b" font-size="10">Waiting...</text>
    </g>
  </g>

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ffffff" />
    </marker>
  </defs>
</svg>
