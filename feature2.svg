<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="f2grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3a52;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d2438;stop-opacity:1" />
    </linearGradient>
    <filter id="f2shadow">
      <feDropShadow dx="2" dy="2" stdDeviation="4" flood-opacity="0.4"/>
    </filter>
  </defs>
  
  <rect width="300" height="300" fill="url(#f2grad)"/>
  
  <!-- Circular dependency diagram -->
  <circle cx="150" cy="80" r="40" fill="rgba(230,76,60,0.3)" stroke="#e74c3c" stroke-width="2" filter="url(#f2shadow)"/>
  <text x="150" y="87" text-anchor="middle" fill="white" font-size="12" font-weight="bold">PROC A</text>
  
  <circle cx="220" cy="150" r="40" fill="rgba(230,76,60,0.3)" stroke="#e74c3c" stroke-width="2" filter="url(#f2shadow)"/>
  <text x="220" y="157" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RES 1</text>
  
  <circle cx="150" cy="220" r="40" fill="rgba(230,76,60,0.3)" stroke="#e74c3c" stroke-width="2" filter="url(#f2shadow)"/>
  <text x="150" y="227" text-anchor="middle" fill="white" font-size="12" font-weight="bold">PROC B</text>
  
  <circle cx="80" cy="150" r="40" fill="rgba(230,76,60,0.3)" stroke="#e74c3c" stroke-width="2" filter="url(#f2shadow)"/>
  <text x="80" y="157" text-anchor="middle" fill="white" font-size="12" font-weight="bold">RES 2</text>
  
  <!-- Arrows showing circular wait -->
  <path d="M 180 50 L 200 120" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowred)"/>
  <path d="M 210 190 L 170 220" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowred)"/>
  <path d="M 120 230 L 100 180" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowred)"/>
  <path d="M 90 120 L 130 70" stroke="#ff6b6b" stroke-width="2.5" fill="none" marker-end="url(#arrowred)"/>
  
  <!-- Warning -->
  <rect x="40" y="260" width="220" height="25" fill="rgba(255,107,107,0.2)" stroke="#ff6b6b" stroke-width="1" rx="4"/>
  <text x="150" y="278" text-anchor="middle" fill="#ff6b6b" font-size="11" font-weight="bold">⚠ DEADLOCK DETECTED</text>
  
  <defs>
    <marker id="arrowred" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#ff6b6b" />
    </marker>
  </defs>
</svg>
