  </defs>
  
  <rect width="300" height="300" fill="url(#f4grad)"/>
  
  <!-- Title -->
  <text x="150" y="30" text-anchor="middle" fill="#f39c12" font-size="13" font-weight="bold">RECOMMENDATIONS</text>
  
  <!-- Lightbulb for ideas -->
  <circle cx="150" cy="60" r="22" fill="#f39c12" opacity="0.7"/>
  <ellipse cx="150" cy="45" rx="8" ry="12" fill="#1a3a52"/>
  <path d="M 140 80 Q 140 85 145 85 L 155 85 Q 160 85 160 80" fill="#f39c12" opacity="0.7"/>
  
  <!-- Recommendation boxes -->
