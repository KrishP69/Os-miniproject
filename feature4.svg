    <text x="65" y="130" fill="#0e7490" font-size="11" font-weight="bold">Process Prioritization</text>
    <text x="65" y="145" fill="rgba(255,255,255,0.7)" font-size="9">Reorder execution sequence</text>
  </g>
  
